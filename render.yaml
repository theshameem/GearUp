services:
  - type: web
    name: gearup-api
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate:deploy && node dist/src/server.js
    healthCheckPath: /api/docs/
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BCRYPT_SALT_ROUNDS
        value: 12
        scope: RUN_AND_BUILD_TIME
      - key: JWT_ACCESS_SECRET
        generateValue: true
        scope: RUN_AND_BUILD_TIME
      - key: JWT_REFRESH_SECRET
        generateValue: true
        scope: RUN_AND_BUILD_TIME
      - key: JWT_ACCESS_EXPIRES_IN
        value: 1d
        scope: RUN_AND_BUILD_TIME
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
        scope: RUN_AND_BUILD_TIME
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRODUCT_PRICE_ID
        sync: false
